! ==========================================================
! NETBOX SYNC FOR CISCO IOS
! ==========================================================
hostname CCTV-MRACK-TEST_C1-CORE_SW-01

clock timezone ICT 7 0
ntp server 8.8.8.8
ntp server 1.1.1.1

! ==========================================================
! MONITORING BASELINE FOR ZABBIX
! ==========================================================
service timestamps log datetime msec localtime show-timezone
service timestamps debug datetime msec localtime show-timezone
logging host 192.168.80.20
logging trap informational
logging source-interface Vlan1
lldp run
ip access-list standard SNMP-MONITORING
 permit 192.168.80.20
 deny any log
snmp-server community public RO SNMP-MONITORING
snmp-server host 192.168.80.20 version 2c public
snmp-server contact network-ops
snmp-server location CHUNGCU / CCTV-MRACK
snmp-server enable traps

! ==========================================================
! VLAN DEFINITIONS FROM NETBOX IPAM
! ==========================================================
vlan 10
 name MGMT
vlan 20
 name CAMERAS
vlan 30
 name WiFi

! ==========================================================
! INTERFACES FROM NETBOX
! ==========================================================
interface Et0/0
 description Downlink to Sw-acc
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 1,10,20
 ip dhcp snooping trust
 spanning-tree link-type point-to-point
 no shutdown
!
