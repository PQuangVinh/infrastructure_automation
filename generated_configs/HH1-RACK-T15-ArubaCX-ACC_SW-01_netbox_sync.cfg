! ==========================================================
! NETBOX SYNC FOR ARUBA AOS-CX
! ==========================================================
hostname HH1-RACK-T15-ArubaCX-ACC_SW-01

ntp enable
ntp server 8.8.8.8
ntp server 1.1.1.1

! ==========================================================
! MONITORING BASELINE FOR ZABBIX
! ==========================================================
logging 192.168.80.20
snmp-server vrf default
snmp-server community public
snmp-server host 192.168.80.20 trap version v2c community public
snmp-server system-contact network-ops
snmp-server system-location CHUNGCU / HH1-RACK-T15
lldp

! ==========================================================
! VLAN DEFINITIONS FROM NETBOX IPAM
! ==========================================================
vlan 1
    name SETUP
vlan 10
    name MGMT
vlan 20
    name CAMERAS
vlan 30
    name WiFi

! ==========================================================
! INTERFACE DESCRIPTION AND VLAN MEMBERSHIP FROM NETBOX
